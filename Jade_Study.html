<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>翡翠书斋v0.0.1beta</title>
    <style>
        /* ----- 全局重置 ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            background: #0f0b09;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        #game-container {
            width: 1150px;
            max-width: 100%;
            background: #1e1612;
            border-radius: 32px;
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(200, 170, 140, 0.06);
            padding: 18px;
            position: relative;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px 14px 8px;
            border-bottom: 1px solid rgba(200, 170, 140, 0.1);
            flex-wrap: wrap;
            gap: 8px;
        }
        #game-title {
            color: #e6d3c0;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 3px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            cursor: default;
        }
        #game-title span {
            color: #b09078;
            font-weight: 300;
        }
        #title-sub {
            font-size: 12px;
            color: #8a7a6a;
            letter-spacing: 1px;
            margin-left: 6px;
        }
        #header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-hint,
        .btn-answer,
        .btn-reset,
        .btn-story {
            background: rgba(180, 150, 120, 0.08);
            border: 1px solid rgba(180, 150, 120, 0.15);
            color: #d4c0aa;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }
        .btn-hint:hover,
        .btn-answer:hover,
        .btn-reset:hover,
        .btn-story:hover {
            background: rgba(180, 150, 120, 0.2);
            border-color: rgba(180, 150, 120, 0.3);
            transform: scale(1.02);
        }
        .btn-answer {
            border-color: rgba(200, 170, 140, 0.25);
            color: #c8b4a0;
        }
        .btn-answer:hover {
            border-color: rgba(200, 170, 140, 0.4);
            background: rgba(180, 150, 120, 0.15);
        }
        #message-area {
            color: #c8b4a0;
            font-size: 14px;
            padding: 6px 18px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 30px;
            min-height: 34px;
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 140px;
            border: 1px solid rgba(200, 170, 140, 0.04);
            font-weight: 300;
        }
        #message-area .highlight {
            color: #f0dcc8;
            font-weight: 500;
        }
        #room-nav {
            display: flex;
            gap: 8px;
            padding: 12px 4px 6px 4px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(200, 170, 140, 0.06);
            margin-bottom: 12px;
        }
        .room-btn {
            background: rgba(40, 30, 24, 0.6);
            border: 1px solid rgba(200, 170, 140, 0.08);
            color: #8a7a6a;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .room-btn.active {
            background: rgba(180, 150, 120, 0.12);
            border-color: rgba(200, 170, 140, 0.25);
            color: #ecd8c0;
            box-shadow: 0 0 20px rgba(180, 150, 120, 0.02);
        }
        .room-btn:hover:not(:disabled) {
            background: rgba(180, 150, 120, 0.15);
            border-color: rgba(200, 170, 140, 0.2);
            color: #ecd8c0;
        }
        .room-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            filter: grayscale(0.6);
        }
        #scene-wrapper {
            background: #15100d;
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid rgba(200, 170, 140, 0.04);
            min-height: 460px;
        }
        #scene {
            position: relative;
            width: 100%;
            min-height: 460px;
            padding: 14px;
            transition: opacity 0.35s ease;
        }
        #scene.fade {
            opacity: 0;
        }
        #scene-content {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            width: 100%;
            min-height: 430px;
        }
        #scene-visual {
            flex: 2.5;
            min-width: 260px;
            background: #120e0b;
            border-radius: 16px;
            padding: 14px;
            border: 1px solid rgba(200, 170, 140, 0.04);
            display: flex;
            flex-direction: column;
        }
        .scene-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(200, 170, 140, 0.06);
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 4px;
        }
        .scene-header .name {
            color: #c8b4a0;
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .scene-header .progress {
            color: #6a5a4a;
            font-size: 13px;
            font-weight: 300;
        }
        #interactives {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
            gap: 10px;
            flex: 1;
            align-content: start;
        }
        .interactive-item {
            background: rgba(50, 38, 30, 0.5);
            border: 1px solid rgba(200, 170, 140, 0.06);
            border-radius: 12px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #c8b4a0;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 78px;
            position: relative;
        }
        .interactive-item:hover:not(.disabled) {
            background: rgba(70, 55, 44, 0.6);
            border-color: rgba(200, 170, 140, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .interactive-item .icon {
            font-size: 28px;
            line-height: 1.2;
        }
        .interactive-item .label {
            font-size: 12px;
            opacity: 0.8;
            line-height: 1.2;
        }
        .interactive-item .sub {
            font-size: 10px;
            color: #7a6a5a;
            font-style: italic;
            margin-top: 2px;
        }
        .interactive-item.found {
            border-color: rgba(180, 150, 120, 0.25);
            background: rgba(180, 150, 120, 0.08);
        }
        .interactive-item.found .label {
            opacity: 0.7;
        }
        .interactive-item.disabled {
            opacity: 0.4;
            filter: grayscale(0.5);
            pointer-events: none;
        }
        #side-panel {
            flex: 1;
            min-width: 170px;
            background: rgba(18, 14, 11, 0.7);
            border-radius: 16px;
            border: 1px solid rgba(200, 170, 140, 0.04);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #side-panel .panel-title {
            color: #6a5a4a;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(200, 170, 140, 0.06);
            padding-bottom: 8px;
        }
        #inventory {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 64px;
            align-content: flex-start;
        }
        .inv-item {
            background: rgba(50, 38, 30, 0.4);
            border: 1px solid rgba(200, 170, 140, 0.06);
            border-radius: 10px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #d4c0aa;
            cursor: default;
            transition: all 0.15s;
        }
        .inv-item .icon {
            font-size: 18px;
        }
        .inv-item .name {
            font-size: 12px;
        }
        #inventory-empty {
            color: #4a3a2a;
            font-size: 13px;
            font-style: italic;
            padding: 6px 0;
            width: 100%;
        }
        .inv-note {
            color: #4a3a2a;
            font-size: 11px;
            padding-top: 6px;
            border-top: 1px solid rgba(200, 170, 140, 0.04);
            margin-top: auto;
        }
        /* ----- 笔记区域 ----- */
        #notes-area {
            margin-top: 6px;
            border-top: 1px solid rgba(200, 170, 140, 0.06);
            padding-top: 10px;
        }
        #notes-area .notes-title {
            color: #6a5a4a;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #notes-area .notes-title .clear-notes {
            background: none;
            border: none;
            color: #6a5a4a;
            font-size: 11px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 12px;
            transition: 0.2s;
            font-family: inherit;
        }
        #notes-area .notes-title .clear-notes:hover {
            color: #c07a6a;
            background: rgba(200, 100, 80, 0.1);
        }
        #notes-area textarea {
            width: 100%;
            min-height: 80px;
            background: rgba(15, 11, 9, 0.6);
            border: 1px solid rgba(200, 170, 140, 0.08);
            border-radius: 10px;
            color: #d4c0aa;
            font-size: 13px;
            font-family: inherit;
            padding: 8px 10px;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.5;
        }
        #notes-area textarea:focus {
            border-color: rgba(200, 170, 140, 0.2);
        }
        #notes-area textarea::placeholder {
            color: #4a3a2a;
            font-style: italic;
        }
        /* ----- 密码弹窗 ----- */
        #password-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 18px;
            z-index: 100;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }
        #password-modal.show {
            display: flex;
        }
        .password-box {
            background: #1e1612;
            padding: 28px 32px 32px 32px;
            border-radius: 24px;
            border: 1px solid rgba(200, 170, 140, 0.12);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            text-align: center;
            max-width: 92%;
            width: 400px;
        }
        .password-box h3 {
            color: #e6d3c0;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 4px;
            font-size: 18px;
        }
        .password-box .pwd-desc {
            color: #8a7a6a;
            font-size: 14px;
            margin-bottom: 14px;
        }
        .password-box .pwd-display {
            background: #0f0b09;
            border: 1px solid rgba(200, 170, 140, 0.12);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 32px;
            color: #e6d3c0;
            text-align: center;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
            min-height: 58px;
            width: 100%;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .password-box .pwd-display .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 32px;
            background: #b09078;
            animation: blink 0.8s step-end infinite;
            margin-left: 4px;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
        /* ----- 数字键盘 ----- */
        .num-keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 12px 0 10px 0;
            max-width: 280px;
            margin-left: auto;
            margin-right: auto;
        }
        .num-keypad button {
            background: rgba(50, 38, 30, 0.6);
            border: 1px solid rgba(200, 170, 140, 0.08);
            border-radius: 12px;
            padding: 14px 0;
            font-size: 22px;
            color: #d4c0aa;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .num-keypad button:hover {
            background: rgba(70, 55, 44, 0.7);
            border-color: rgba(200, 170, 140, 0.2);
            transform: scale(1.03);
        }
        .num-keypad button:active {
            transform: scale(0.92);
            background: rgba(90, 70, 55, 0.7);
        }
        .num-keypad button.key-fn {
            background: rgba(40, 30, 24, 0.5);
            color: #8a7a6a;
            font-size: 16px;
        }
        .num-keypad button.key-fn:hover {
            background: rgba(60, 45, 35, 0.6);
            color: #b09078;
        }
        .num-keypad button.key-clear {
            color: #c07a6a;
        }
        .num-keypad button.key-clear:hover {
            background: rgba(80, 40, 35, 0.4);
            border-color: rgba(200, 100, 80, 0.2);
        }
        .num-keypad button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .password-box .pwd-error {
            color: #c07a6a;
            font-size: 13px;
            min-height: 22px;
            margin-top: 4px;
        }
        .password-box .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }
        .password-box .actions button {
            background: rgba(180, 150, 120, 0.08);
            border: 1px solid rgba(200, 170, 140, 0.1);
            color: #d4c0aa;
            padding: 8px 28px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .password-box .actions button:hover {
            background: rgba(180, 150, 120, 0.2);
            border-color: rgba(200, 170, 140, 0.2);
        }
        .password-box .actions button.primary {
            background: #b09078;
            color: #0f0b09;
            border-color: #b09078;
        }
        .password-box .actions button.primary:hover {
            background: #c8a890;
        }
        /* ----- 故事弹窗 ----- */
        #story-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 18px;
            z-index: 150;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        #story-modal.show {
            display: flex;
        }
        .story-box {
            background: #1e1612;
            padding: 32px 40px;
            border-radius: 24px;
            border: 1px solid rgba(200, 170, 140, 0.12);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
            max-width: 92%;
            width: 580px;
            max-height: 80vh;
            overflow-y: auto;
            color: #d4c0aa;
        }
        .story-box h2 {
            color: #ecd8c0;
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(200, 170, 140, 0.1);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .story-box .story-entry {
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(200, 170, 140, 0.06);
        }
        .story-box .story-entry h3 {
            color: #ecd8c0;
            font-size: 17px;
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .story-box .story-entry p {
            line-height: 1.8;
            font-size: 15px;
            color: #c8b4a0;
        }
        .story-box .story-empty {
            color: #6a5a4a;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }
        .story-box .close-story {
            margin-top: 16px;
            background: rgba(180, 150, 120, 0.15);
            border: 1px solid rgba(200, 170, 140, 0.15);
            color: #ecd8c0;
            padding: 8px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            font-family: inherit;
        }
        .story-box .close-story:hover {
            background: rgba(180, 150, 120, 0.25);
        }
        /* ----- 胜利弹窗 ----- */
        #win-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 18px;
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        #win-modal.show {
            display: flex;
        }
        .win-box {
            text-align: center;
            padding: 44px 50px;
            background: #1e1612;
            border-radius: 28px;
            border: 1px solid rgba(200, 170, 140, 0.15);
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            max-width: 92%;
        }
        .win-box .big-icon {
            font-size: 80px;
            margin-bottom: 10px;
        }
        .win-box h2 {
            color: #ecd8c0;
            font-size: 30px;
            font-weight: 500;
            letter-spacing: 4px;
        }
        .win-box p {
            color: #b09880;
            font-size: 16px;
            margin: 14px 0 28px;
            line-height: 1.7;
        }
        .win-box button {
            background: #b09078;
            border: none;
            color: #0f0b09;
            padding: 12px 44px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .win-box button:hover {
            background: #c8a890;
            transform: scale(1.02);
        }
        /* ----- 响应式 ----- */
        @media (max-width: 760px) {
            #scene-content {
                flex-direction: column;
            }
            #side-panel {
                min-width: unset;
            }
            #interactives {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            }
            .password-box {
                padding: 20px 18px 24px 18px;
                width: 95%;
            }
            .password-box .pwd-display {
                font-size: 26px;
                min-height: 48px;
                letter-spacing: 6px;
            }
            .num-keypad {
                gap: 6px;
                max-width: 240px;
            }
            .num-keypad button {
                padding: 12px 0;
                font-size: 20px;
                min-height: 44px;
            }
            #game-title {
                font-size: 18px;
            }
            #header {
                flex-direction: column;
                align-items: stretch;
            }
            #room-nav {
                justify-content: center;
            }
            .story-box {
                padding: 24px 20px;
            }
            #header-controls {
                justify-content: center;
            }
            #notes-area textarea {
                min-height: 60px;
                font-size: 12px;
            }
        }
        @media (max-width: 480px) {
            #interactives {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            }
            .interactive-item .icon {
                font-size: 22px;
            }
            .win-box {
                padding: 28px 16px;
            }
            .win-box .big-icon {
                font-size: 54px;
            }
            .num-keypad button {
                padding: 10px 0;
                font-size: 18px;
                min-height: 38px;
            }
            .password-box .pwd-display {
                font-size: 22px;
                min-height: 40px;
                letter-spacing: 4px;
            }
            .password-box .actions button {
                padding: 6px 18px;
                font-size: 13px;
            }
            #notes-area textarea {
                min-height: 50px;
            }
        }
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0b09;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a2a1a;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <div id="game-title">📜 翡翠<span>书斋</span><span id="title-sub"></span></div>
            <div id="header-controls">
                <button class="btn-story" id="btn-story">📖 故事</button>
                <button class="btn-hint" id="btn-hint">💡 提示</button>
                <button class="btn-answer" id="btn-answer">🔑 答案</button>
                <button class="btn-reset" id="btn-reset">⟳ 重开</button>
            </div>
        </div>
        <div id="message-area">🔍 探索门厅，寻找线索...</div>
        <div id="room-nav">
            <button class="room-btn active" data-room="hall" id="nav-hall">🏛️ 门厅</button>
            <button class="room-btn" data-room="crypt" id="nav-crypt" disabled>🪦 地窖</button>
            <button class="room-btn" data-room="study" id="nav-study" disabled>📚 书房</button>
            <button class="room-btn" data-room="garden" id="nav-garden" disabled>🌿 花园</button>
            <button class="room-btn" data-room="tower" id="nav-tower" disabled>🗼 塔楼</button>
            <button class="room-btn" data-room="sanctum" id="nav-sanctum" disabled>✨ 圣殿</button>
        </div>
        <div id="scene-wrapper">
            <div id="scene">
                <div id="scene-content">
                    <div id="scene-visual">
                        <div class="scene-header">

            // ---------- 密码弹窗（带数字键盘） ----------
            let pwdCallback = null;
            let pwdMaxLen = 3;
            let pwdCurrentValue = '';

            function updatePwdDisplay() {
                const display = dom.pwdDisplay;
                const raw = pwdCurrentValue;
                let shown = '';
                for (let i = 0; i < pwdMaxLen; i++) {
                    shown += (i < raw.length) ? raw[i] : '·';
                }
                display.textContent = shown;
            }

            function handlePwdDigit(digit) {
                if (pwdCurrentValue.length >= pwdMaxLen) return;
                pwdCurrentValue += digit;
                updatePwdDisplay();
                dom.pwdError.textContent = '';
            }

            function handlePwdBackspace() {
                pwdCurrentValue = pwdCurrentValue.slice(0, -1);
                updatePwdDisplay();
                dom.pwdError.textContent = '';
            }

            function handlePwdClear() {
                pwdCurrentValue = '';
                updatePwdDisplay();
                dom.pwdError.textContent = '';
            }

            function showPasswordModal(hint, callback, placeholder = '三位数字') {
                dom.pwdHint.textContent = hint || '请输入三位数字';
                dom.pwdError.textContent = '';
                pwdCurrentValue = '';
                pwdMaxLen = 3;
                pwdCallback = callback;
                updatePwdDisplay();
                dom.modal.classList.add('show');

                // 重建按钮事件（取消/确认）
                const newConfirm = dom.pwdConfirm.cloneNode(true);
                const newCancel = dom.pwdCancel.cloneNode(true);
                dom.pwdConfirm.parentNode.replaceChild(newConfirm, dom.pwdConfirm);
                dom.pwdCancel.parentNode.replaceChild(newCancel, dom.pwdCancel);
                dom.pwdConfirm = newConfirm;
                dom.pwdCancel = newCancel;

                dom.pwdConfirm.addEventListener('click', () => {
                    const val = pwdCurrentValue;
                    if (!val || val.length < pwdMaxLen) {
                        dom.pwdError.textContent = `请输入 ${pwdMaxLen} 位数字`;
                        return;
                    }
                    if (pwdCallback) {
                        const result = pwdCallback(val);
                        if (result === true) {
                            dom.modal.classList.remove('show');
                            GAME.state.currentAnswer = null;
                            pwdCallback = null;
                        } else if (result === false) {
                            dom.pwdError.textContent = '❌ 密码错误';
                            pwdCurrentValue = '';
                            updatePwdDisplay();
                        } else {
                            dom.modal.classList.remove('show');
                            GAME.state.currentAnswer = null;
                            pwdCallback = null;
                        }
                    }
                });
                dom.pwdCancel.addEventListener('click', () => {
                    dom.modal.classList.remove('show');
                    GAME.state.currentAnswer = null;
                    pwdCallback = null;
                    setMessage('已取消输入。');
                });

                // 数字键盘事件
                const keypad = dom.numKeypad;
                const newKeypad = keypad.cloneNode(true);
                keypad.parentNode.replaceChild(newKeypad, keypad);
                dom.numKeypad = newKeypad;

                dom.numKeypad.querySelectorAll('button').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const digit = btn.dataset.digit;
                        if (digit === 'backspace') {
                            handlePwdBackspace();
                        } else if (digit === 'clear') {
                            handlePwdClear();
                        } else {
                            handlePwdDigit(digit);
                        }
                    });
                });

                // 物理键盘支持
                const keyHandler = (e) => {
                    if (!dom.modal.classList.contains('show')) {
                        document.removeEventListener('keydown', keyHandler);
                        return;
                    }
                    if (e.key >= '0' && e.key <= '9') {
                        e.preventDefault();
                        handlePwdDigit(e.key);
                    } else if (e.key === 'Backspace') {
                        e.preventDefault();
                        handlePwdBackspace();
                    } else if (e.key === 'Delete' || e.key === 'Escape') {
                        e.preventDefault();
                        handlePwdClear();
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        dom.pwdConfirm.click();
                    }
                };
                document.addEventListener('keydown', keyHandler);
                dom.modal._keyHandler = keyHandler;
            }

            // 清理密码弹窗键盘监听
            function cleanupPwdKeyHandler() {
                if (dom.modal._keyHandler) {
                    document.removeEventListener('keydown', dom.modal._keyHandler);
                    dom.modal._keyHandler = null;
                }
            }

            // 在关闭弹窗时清理
            const origModalClose = dom.modal.classList.remove.bind(dom.modal.classList);
            dom.modal.classList.remove = function(className) {
                if (className === 'show') {
                    cleanupPwdKeyHandler();
                }
                origModalClose(className);
            };

                if (id === 'crypt' && !GAME.state.cryptUnlocked) { setMessage('门厅的机关尚未开启地窖入口。'); return; }
                if (id === 'study' && !GAME.state.studyUnlocked) { setMessage('地窖的铁门尚未打开。'); return; }

            function renderScene(id) {
                const scene = GAME.scenes[id];
                if (!scene) return;
                dom.sceneName.textContent = scene.name;
                const items = scene.items;
                let found = items.filter(i => i.found).length;
                dom.sceneProgress.textContent = `${found} / ${items.length}`;

                dom.interactives.innerHTML = '';
                items.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'interactive-item';
                    if (item.found) el.classList.add('found');
                    if (item.disabled) el.classList.add('disabled');

                    const iconMatch = item.label.match(/^([^\s]+)\s/);
                    if (iconMatch) {
                        const iconSpan = document.createElement('div');
                        iconSpan.className = 'icon';
                        iconSpan.textContent = iconMatch[1];
                        el.appendChild(iconSpan);
                        const labelSpan = document.createElement('div');
                        labelSpan.className = 'label';
                        labelSpan.textContent = item.label.replace(/^[^\s]+\s/, '');
                        el.appendChild(labelSpan);
                    } else {
                        const iconSpan = document.createElement('div');
                        iconSpan.className = 'icon';
                        iconSpan.textContent = '📦';
                        el.appendChild(iconSpan);
                        const labelSpan = document.createElement('div');
                        labelSpan.className = 'label';
                        labelSpan.textContent = item.label;
                        el.appendChild(labelSpan);
                    }
                    if (item.sub) {
                        const sub = document.createElement('div');
                        sub.className = 'sub';
                        sub.textContent = item.sub;
                        el.appendChild(sub);
                    }
                    el.dataset.itemId = item.id;

                    dom.interactives.appendChild(el);

                if (GAME.state.gameWon) { setMessage('🎉 你已经通关！点击"重开"再次体验。'); return; }
                const s = GAME.state;
                const inv = GAME.inventory;
                const hints = [];

                if (!s.paintingSearched) hints.push('检查肖像画。');
                if (s.paintingSearched && !s.clockOpened && !hasInventory('winding_key')) hints.push('用发条钥匙开落地钟。');
                if (s.clockOpened && !s.statueSolved && hasInventory('sun_medal')) hints.push('将太阳徽章嵌入石像。');
                if (!s.cryptUnlocked && s.statueSolved) hints.push('地窖入口已开，进入地窖。');
                if (!s.carpetLifted) hints.push('检查地毯。');
                if (!s.windowOpened) hints.push('打开窗户。');
                if (!s.chandelierSearched) hints.push('查看吊灯。');

                if (s.cryptUnlocked && s.currentScene === 'crypt') {
                    if (!s.sarcophagusOpened && hasInventory('copper_key_hall')) hints.push('用铜钥匙开石棺。');
                    if (s.sarcophagusOpened && !s.altarCryptUsed && hasInventory('moon_shard')) hints.push(
                        '将月之碎片放入祭坛。');
                    if (s.altarCryptUsed && !s.chestCryptOpened && hasInventory('nightstone')) hints.push(
                        '用夜光石打开铁箱。');
                    if (s.chestCryptOpened && !s.cryptDoorUnlocked && hasInventory('study_key')) hints.push(
                        '用书房钥匙打开铁门。');
                    if (!s.torchLit && hasInventory('match')) hints.push('点燃火炬照亮暗格。');
                    if (!s.pillarCryptRead) hints.push('查看柱基上的铭文。');
                }

                if (s.studyUnlocked && s.currentScene === 'study') {
                    if (!s.globeSearched) hints.push('检查地球仪。');
                    if (s.globeSearched && !s.mirrorCleaned && hasInventory('cloth')) hints.push('用绒布擦铜镜。');
                    if (s.mirrorCleaned && !s.bookshelfUnlocked) hints.push('书架需要密码，镜中所示。');
                    if (s.bookshelfUnlocked && !s.fireplaceLit && hasInventory('firewood')) hints.push('用木柴点燃壁炉。');
                    if (s.fireplaceLit && !s.deskOpened && hasInventory('silver_key')) hints.push('用银钥匙开书桌。');
                    if (s.deskOpened && !s.gardenUnlocked) hints.push('前往花园。');
                    if (!s.frescoRead) hints.push('查看壁画。');
                    if (!s.inkwellUsed) hints.push('检查墨水瓶。');
                    if (s.inkwellUsed && !s.quillUsed && hasInventory('quill')) hints.push('用羽毛笔蘸墨水。');
                    if (!s.candleStudyUsed && hasInventory('match')) hints.push('点燃书桌烛台。');
                }

                if (s.gardenUnlocked && s.currentScene === 'garden') {
                    if (!s.fountainSearched && hasInventory('garden_key')) hints.push('将花园钥匙插入喷泉。');
                    if (s.fountainSearched && !s.flowerbedDug && hasInventory('copper_key_garden')) hints.push(
                        '用铜钥匙翻花坛。');
                    if (s.flowerbedDug && !s.treeDug && hasInventory('shovel')) hints.push('用铁锹挖古树。');
                    if (s.treeDug && !s.statueLocked && hasInventory('gold_key')) hints.push('用金钥匙开园丁像。');
                    if (s.statueLocked && !s.gardenGateUnlocked) hints.push('输入花园门密码（羊皮纸）。');
                    if (!s.wellDrawn && hasInventory('copper_key_garden')) hints.push('用铜钥匙卡住绞盘打水井。');
                    if (!s.bushSearched && hasInventory('dagger')) hints.push('用匕首割开灌木丛。');
                    if (!s.benchRead) hints.push('阅读长椅上的诗句。');
                }

                if (s.towerUnlocked && s.currentScene === 'tower') {
                    if (!s.tapestryOpened && hasInventory('dagger')) hints.push('用匕首挑开挂毯。');
                    if (!s.bookcaseUnlocked) hints.push('书柜需要密码（园丁像纸条）。');
                    if (!s.telescopeUsed) hints.push('用望远镜观察星空。');
                    if (!s.treasureOpened && hasInventory('emerald_gem') && hasInventory('gem_shard') && hasInventory(
                            'stone_tablet')) hints.push(
                        '将三件圣物嵌入宝箱并输入望远镜密码。');
                    if (!s.astrolabeUsed) hints.push('研究星盘。');
                    if (!s.candleTowerLit && hasInventory('match') && hasInventory('candle_item')) hints.push(
                        '点燃塔楼烛台。');
                    if (!s.paintingTowerSearched) hints.push('查看年轻格雷的画像。');
                }

                if (s.sanctumUnlocked && s.currentScene === 'sanctum') {
                    if (!s.pillarSolved && s.astrolabeUsed && s.candleTowerLit) hints.push('调整石柱符文。');
                    if (!s.altarActivated && hasInventory('rune_key') && s.pillarSolved) hints.push(
                        '将符文钥匙插入祭坛。');
                    if (!s.crystalUsed) hints.push('触碰水晶。');
                    if (!s.scrollSanctumRead) hints.push('阅读卷轴。');
                    if (!s.brazierLit && hasInventory('match')) hints.push('点燃火盆。');
                }

                if (hints.length === 0) {
                    if (GAME.clues.length > 0) {
                        const c = GAME.clues[Math.floor(Math.random() * GAME.clues.length)];
                        setMessage(`💡 回想线索：${c}`);
                    } else {
                        setMessage('💡 仔细探索每个角落。');
                    }
                } else {
                    setMessage(`💡 ${hints[Math.floor(Math.random() * hints.length)]}`);
                }
            }

            function resetGame() {
                initPasswords();
                GAME.inventory = [];
                GAME.clues = [];
                GAME.storyUnlocked = [];
                GAME.state = {
                    currentScene: 'hall',
                    paintingSearched: false,
                    clockOpened: false,
                    statueSolved: false,
                    carpetLifted: false,
                    windowOpened: false,
                    chandelierSearched: false,
                    doorUnlocked: false,
                    sarcophagusOpened: false,
                    altarCryptUsed: false,
                    pillarCryptRead: false,
                    chestCryptOpened: false,
                    cryptDoorUnlocked: false,
                    torchLit: false,
                    globeSearched: false,
                    mirrorCleaned: false,
                    bookshelfUnlocked: false,
                    fireplaceLit: false,
                    deskOpened: false,
                    frescoRead: false,
                    inkwellUsed: false,
                    quillUsed: false,
                    candleStudyUsed: false,
                    fountainSearched: false,
                    flowerbedDug: false,
                    treeDug: false,
                    statueLocked: false,
                    gardenGateUnlocked: false,
                    wellDrawn: false,
                    bushSearched: false,
                    benchRead: false,
                    tapestryOpened: false,
                    bookcaseUnlocked: false,
                    telescopeUsed: false,
                    treasureOpened: false,
                    astrolabeUsed: false,
                    candleTowerLit: false,
                    paintingTowerSearched: false,
                    altarActivated: false,
                    pillarSolved: false,
                    crystalUsed: false,
                    scrollSanctumRead: false,
                    brazierLit: false,
                    cryptUnlocked: false,
                    studyUnlocked: false,
                    gardenUnlocked: false,
                    towerUnlocked: false,
                    sanctumUnlocked: false,
                    gameWon: false,
                    passwords: GAME.state.passwords,
                    currentAnswer: null,
                };
                Object.keys(GAME.scenes).forEach(k => {
                    GAME.scenes[k].items.forEach(it => { it.found = false;
                        it.disabled = false; });
                });
                dom.modal.classList.remove('show');
                dom.winModal.classList.remove('show');
                dom.storyModal.classList.remove('show');
                dom.scene.classList.add('fade');
                renderStoryModal();
                setTimeout(() => {
                    renderScene('hall');
                    updateNav();
                    dom.scene.classList.remove('fade');
                    setMessage('🔄 游戏已重置，新的密码已生成！从门厅开始。');
                }, 280);
            }

            function init() {
                initPasswords();
                renderScene('hall');
                updateNav();
                renderStoryModal();
                loadNotes();
                setMessage('🏛️ 你站在门厅，空气中弥漫着檀香... 寻找线索，揭开六幕传奇。');

                // 笔记自动保存
                dom.notesTextarea.addEventListener('input', saveNotes);
                dom.clearNotes.addEventListener('click', clearNotes);

                dom.navHall.addEventListener('click', () => switchScene('hall'));
                dom.navCrypt.addEventListener('click', () => switchScene('crypt'));
                dom.navStudy.addEventListener('click', () => switchScene('study'));
                dom.navGarden.addEventListener('click', () => switchScene('garden'));
                dom.navTower.addEventListener('click', () => switchScene('tower'));
                dom.navSanctum.addEventListener('click', () => switchScene('sanctum'));

                dom.btnHint.addEventListener('click', showHint);
                dom.btnAnswer.addEventListener('click', showAnswer);
                dom.btnReset.addEventListener('click', resetGame);
                dom.winRestart.addEventListener('click', resetGame);

                dom.btnStory.addEventListener('click', () => {
                    dom.storyModal.classList.add('show');
                });
                dom.storyClose.addEventListener('click', () => {
                    dom.storyModal.classList.remove('show');
                });
                dom.storyModal.addEventListener('click', (e) => {
                    if (e.target === dom.storyModal) dom.storyModal.classList.remove('show');
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'h' || e.key === 'H') showHint();
                    if (e.key === 'a' || e.key === 'A') showAnswer();
                    if (e.key === 'r' || e.key === 'R') { if (confirm('重置游戏？')) resetGame(); }
                    if (e.key === '1') switchScene('hall');
                    if (e.key === '2') switchScene('crypt');
                    if (e.key === '3') switchScene('study');
                    if (e.key === '4') switchScene('garden');
                    if (e.key === '5') switchScene('tower');
                    if (e.key === '6') switchScene('sanctum');
                });

                console.log('📜 翡翠书斋 · 六幕史诗 (随机密码) 已加载');
                console.log('💡 快捷键: [1-6]切换场景 [H]提示 [A]答案 [R]重置');
                console.log('🔑 本次密码已随机生成，祝你好运！');
            }

            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                init();
            } else {
                document.addEventListener('DOMContentLoaded', init);
            }
        })();
    </script>
</body>
</html>
